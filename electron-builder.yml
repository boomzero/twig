appId: com.twig.app
productName: twig
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!svelte.config.mjs'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
electronLanguages:
  - en-US
  - zh-CN
asarUnpack:
  - resources/**
fileAssociations:
  - ext: tb
    name: Twig Presentation
    description: Twig Presentation File
    mimeType: application/x-twig
    icon: build/icon
    role: Editor
win:
  executableName: twig
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  bundleShortVersion: 1.0.0
  bundleVersion: 1.0.18
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    ITSAppUsesNonExemptEncryption: false
    NSDocumentsFolderUsageDescription: twig needs access to your Documents folder to open and save presentations.
    NSDownloadsFolderUsageDescription: twig needs access to your Downloads folder to open and save presentations.
    CFBundleLocalizations:
      - en
      - zh-CN
  notarize: true
dmg:
  artifactName: ${name}-${version}.${ext}
mas:
  entitlements: build/entitlements.mas.plist
  entitlementsInherit: build/entitlements.mas.inherit.plist
  provisioningProfile: build/twig.provisionprofile
  identity: "Apple Distribution: Chenrui Zhu (65ZLJ987GH)"
  artifactName: ${name}-${version}-mas.${ext}
  extendInfo:
    ITSAppUsesNonExemptEncryption: false
    NSDocumentsFolderUsageDescription: twig needs access to your Documents folder to open and save presentations.
    CFBundleLocalizations:
      - en
      - zh-CN
  notarize: false
linux:
  target:
    - AppImage
    - deb
  maintainer: boomzero
  category: Utility
  icon: build/icons/png
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
publish:
  provider: github
  owner: boomzero
  repo: twig
  releaseType: draft
