<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>twig</title>
    <!-- https://developer.mozilla.org/en-US/docs/Web/HTTP/CSP -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:"
    />
    <style>
      :root {
        color: #111827;
        background:
          radial-gradient(circle at top, rgba(45, 212, 191, 0.16), transparent 32%),
          linear-gradient(180deg, #f7f6f3 0%, #efede7 100%);
        font-family: 'Avenir Next', 'Segoe UI', sans-serif;
      }

      html,
      body {
        margin: 0;
        height: 100%;
      }

      body {
        overflow: hidden;
      }

      #app {
        height: 100%;
      }

      #boot-splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        transition:
          opacity 180ms ease,
          visibility 180ms ease;
      }

      body[data-app-ready='true'] #boot-splash {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .boot-shell {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        text-align: center;
      }

      .boot-mark {
        width: 88px;
        height: 88px;
        padding: 10px;
        border-radius: 28px;
        border: 1px solid rgba(255, 255, 255, 0.72);
        background: #20242d;
        box-shadow: 0 24px 56px -30px rgba(15, 23, 42, 0.78);
        animation: boot-breathe 1.8s ease-in-out infinite;
      }

      .boot-mark img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      .boot-wordmark {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: #6b7280;
      }

      .boot-title {
        font-size: 1.5rem;
        font-weight: 600;
        color: #111827;
      }

      .boot-detail {
        margin-top: 6px;
        font-size: 0.95rem;
        color: #6b7280;
      }

      @keyframes boot-breathe {
        0%,
        100% {
          transform: translateY(0);
          box-shadow: 0 24px 56px -30px rgba(15, 23, 42, 0.78);
        }

        50% {
          transform: translateY(-3px);
          box-shadow: 0 30px 64px -32px rgba(45, 212, 191, 0.55);
        }
      }
    </style>
  </head>

  <body>
    <div id="boot-splash" role="status" aria-live="polite" aria-atomic="true">
      <div class="boot-shell">
        <div class="boot-mark">
          <img id="boot-logo" alt="twig logo" hidden />
        </div>
        <div>
          <div class="boot-wordmark">twig</div>
          <div id="boot-title" class="boot-title">Loading...</div>
          <div id="boot-detail" class="boot-detail">Preparing the editor</div>
        </div>
      </div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
