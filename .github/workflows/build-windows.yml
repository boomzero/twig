name: Build Windows

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.github/workflows/claude*.yml'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Rebuild native modules for Electron
        run: npx electron-builder install-app-deps

      - name: Build app
        run: npm run build

      - name: Build Windows Store package (.appx)
        run: npx electron-builder --config electron-builder.win-store.config.cjs --win appx --publish never

      - name: Validate AppX manifest metadata
        shell: pwsh
        run: |
          $appx = Get-ChildItem dist\*.appx | Select-Object -First 1
          if (-not $appx) {
            throw "No AppX artifact found in dist"
          }

          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zip = [System.IO.Compression.ZipFile]::OpenRead($appx.FullName)
          try {
            $entry = $zip.GetEntry('AppxManifest.xml')
            if (-not $entry) {
              throw "AppxManifest.xml not found in $($appx.Name)"
            }

            $reader = New-Object System.IO.StreamReader($entry.Open())
            try {
              [xml]$manifest = $reader.ReadToEnd()
            } finally {
              $reader.Dispose()
            }
          } finally {
            $zip.Dispose()
          }

          $expectedIdentityName = if ($env:WINDOWS_STORE_IDENTITY_NAME) {
            $env:WINDOWS_STORE_IDENTITY_NAME
          } else {
            'FF08CC69.TwigPresentationEditor'
          }
          $expectedPublisher = if ($env:WINDOWS_STORE_PUBLISHER) {
            $env:WINDOWS_STORE_PUBLISHER
          } else {
            'CN=76F716C7-82A7-4940-8AF7-087E05524817'
          }
          $expectedDisplayName = if ($env:WINDOWS_STORE_DISPLAY_NAME) {
            $env:WINDOWS_STORE_DISPLAY_NAME
          } else {
            'Twig Presentation Editor'
          }
          $expectedPublisherDisplayName = if ($env:WINDOWS_STORE_PUBLISHER_DISPLAY_NAME) {
            $env:WINDOWS_STORE_PUBLISHER_DISPLAY_NAME
          } else {
            '朱晨瑞'
          }

          $mismatches = @()

          if ($manifest.Package.Identity.Name -ne $expectedIdentityName) {
            $mismatches += "Identity.Name expected '$expectedIdentityName' but found '$($manifest.Package.Identity.Name)'"
          }
          if ($manifest.Package.Identity.Publisher -ne $expectedPublisher) {
            $mismatches += "Identity.Publisher expected '$expectedPublisher' but found '$($manifest.Package.Identity.Publisher)'"
          }
          if ($manifest.Package.Properties.DisplayName -ne $expectedDisplayName) {
            $mismatches += "Properties.DisplayName expected '$expectedDisplayName' but found '$($manifest.Package.Properties.DisplayName)'"
          }
          if ($manifest.Package.Properties.PublisherDisplayName -ne $expectedPublisherDisplayName) {
            $mismatches += "Properties.PublisherDisplayName expected '$expectedPublisherDisplayName' but found '$($manifest.Package.Properties.PublisherDisplayName)'"
          }

          if ($mismatches.Count -gt 0) {
            throw ($mismatches -join "`n")
          }

          Write-Host "Validated Store metadata:"
          Write-Host "  Identity.Name=$($manifest.Package.Identity.Name)"
          Write-Host "  Identity.Publisher=$($manifest.Package.Identity.Publisher)"
          Write-Host "  Properties.DisplayName=$($manifest.Package.Properties.DisplayName)"
          Write-Host "  Properties.PublisherDisplayName=$($manifest.Package.Properties.PublisherDisplayName)"

      - name: Upload Windows Store package
        uses: actions/upload-artifact@v4
        with:
          name: twig-windows-appx
          path: |
            dist/*.appx
          if-no-files-found: error
          retention-days: 30

      - name: Build Windows installer (.exe)
        run: npx electron-builder --win --publish never

      - name: Validate Windows installer artifact
        shell: pwsh
        run: |
          $exe = Get-ChildItem dist\*.exe | Select-Object -First 1
          if (-not $exe) {
            throw "No EXE artifact found in dist"
          }

          Write-Host "Validated installer artifact:"
          Write-Host "  Name=$($exe.Name)"
          Write-Host "  Size=$([Math]::Round($exe.Length / 1MB, 2)) MB"

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: twig-windows-exe
          path: |
            dist/*.exe
          if-no-files-found: error
          retention-days: 30
