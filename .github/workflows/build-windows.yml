name: Build Windows

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.github/workflows/claude*.yml'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Rebuild native modules for Electron
        run: npx electron-builder install-app-deps

      - name: Build Windows Store package
        run: npm run build && npx electron-builder --config electron-builder.win-store.config.cjs --win appx --publish never
        env:
          WINDOWS_STORE_IDENTITY_NAME: ${{ secrets.WINDOWS_STORE_IDENTITY_NAME }}
          WINDOWS_STORE_PUBLISHER: ${{ secrets.WINDOWS_STORE_PUBLISHER }}
          WINDOWS_STORE_PUBLISHER_DISPLAY_NAME: ${{ secrets.WINDOWS_STORE_PUBLISHER_DISPLAY_NAME }}

      - name: Validate AppX manifest metadata
        shell: pwsh
        env:
          WINDOWS_STORE_PUBLISHER_DISPLAY_NAME: ${{ secrets.WINDOWS_STORE_PUBLISHER_DISPLAY_NAME }}
        run: |
          $appx = Get-ChildItem dist\*.appx | Select-Object -First 1
          if (-not $appx) {
            throw "No AppX artifact found in dist"
          }

          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zip = [System.IO.Compression.ZipFile]::OpenRead($appx.FullName)
          try {
            $entry = $zip.GetEntry('AppxManifest.xml')
            if (-not $entry) {
              throw "AppxManifest.xml not found in $($appx.Name)"
            }

            $reader = New-Object System.IO.StreamReader($entry.Open())
            try {
              [xml]$manifest = $reader.ReadToEnd()
            } finally {
              $reader.Dispose()
            }
          } finally {
            $zip.Dispose()
          }

          $expectedDisplayName = if ($env:WINDOWS_STORE_PUBLISHER_DISPLAY_NAME) {
            $env:WINDOWS_STORE_PUBLISHER_DISPLAY_NAME
          } else {
            '朱晨瑞'
          }
          $actualDisplayName = $manifest.Package.Properties.PublisherDisplayName

          if ($actualDisplayName -ne $expectedDisplayName) {
            throw "PublisherDisplayName mismatch. Expected '$expectedDisplayName' but found '$actualDisplayName'."
          }

          Write-Host "Validated PublisherDisplayName: $actualDisplayName"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: twig-windows-store
          path: |
            dist/*.appx
          if-no-files-found: error
          retention-days: 30
