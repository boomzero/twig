name: Build Windows

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.github/workflows/claude*.yml'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Rebuild native modules for Electron
        run: npx electron-builder install-app-deps

      - name: Build Windows Store package
        run: npm run build && npx electron-builder --config electron-builder.win-store.config.cjs --win msix --publish never
        env:
          WINDOWS_STORE_IDENTITY_NAME: ${{ secrets.WINDOWS_STORE_IDENTITY_NAME }}
          WINDOWS_STORE_PUBLISHER: ${{ secrets.WINDOWS_STORE_PUBLISHER }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: twig-windows-store
          path: |
            dist/*.msix
          if-no-files-found: error
          retention-days: 30
